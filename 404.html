<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>找不到頁面｜百家樂觀測局</title>
  <meta name="robots" content="noindex, follow">
  <style>
    body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:linear-gradient(180deg,#0c3d2e,#143f32);color:#f8f2e7;display:grid;place-items:center;min-height:100vh;padding:24px}
    .card{max-width:620px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:24px;padding:32px;box-shadow:0 20px 50px rgba(0,0,0,.22)}
    h1{margin:0 0 10px;font-size:42px;line-height:1.2}
    p{margin:10px 0;color:rgba(248,242,231,.82);line-height:1.8}
    a{display:inline-flex;margin-top:16px;padding:12px 18px;border-radius:12px;background:#e2be63;color:#143f32;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <div class="card">
    <h1>這頁不在牌桌上。</h1>
    <p>你要找的內容可能已經移動、網址輸入錯誤，或尚未正式上線。</p>
    <p>可以先回首頁，從百家樂規則、路單或機率教學重新開始。</p>
    <a href="/">回到首頁</a>
  </div>
</body>
</html>
